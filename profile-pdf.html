<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recruiting Profile</title>
<link rel="stylesheet" href="styles.css">
<script defer src="config.js"></script>
<script defer src="app.js"></script>

<style>
body {
  background: white;
  color: #000;
  font-family: Arial, sans-serif;
  padding: 30px;
}
.sheet {
  max-width: 900px;
  margin: auto;
}
.header {
  display: flex;
  justify-content: space-between;
  border-bottom: 3px solid #000;
  padding-bottom: 10px;
}
.name {
  font-size: 28px;
  font-weight: bold;
}
.section {
  margin-top: 20px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}
.stat {
  border: 1px solid #ccc;
  padding: 8px;
}
@media print {
  button { display: none; }
}
</style>
</head>

<body data-page="profile-pdf">
<div class="sheet" id="sheet">Loading...</div>
<button onclick="window.print()">Download / Print PDF</button>
</body>
</html>
